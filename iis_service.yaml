---
- name: Manage Windows Service
  hosts: all
  gather_facts: false
  become: true
  vars:
    #service_name: Spooler   # Example: Print Spooler
    #action: stopped        # started / stopped / restarted

  tasks:
    - name: Manage Windows service
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: "{{ action }}"
